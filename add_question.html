{% extends "base.html" %}

{% block title %}Add Question{% endblock %}

{% block content %}
<h2>Add Question to {{ test[1] }}</h2>

<form method="POST" class="form-card">
    <label>Question Text</label>
    <input type="text" name="question_text" required>

    <label>Marks</label>
    <input type="number" name="marks" value="1" required>

    <label>Option 1</label>
    <input type="text" name="option1" required>

    <label>Option 2</label>
    <input type="text" name="option2" required>

    <label>Option 3</label>
    <input type="text" name="option3" required>

    <label>Option 4</label>
    <input type="text" name="option4" required>

    <label>Correct Option Number (1/2/3/4)</label>
    <input type="number" name="correct_option" min="1" max="4" required>

    <button type="submit" class="button">Add Question</button>
</form>
{% endblock %}
